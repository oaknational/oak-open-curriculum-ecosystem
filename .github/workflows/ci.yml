name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run secret scan
        run: |
          if command -v gitleaks >/dev/null 2>&1; then
            pnpm secrets:scan
          else
            echo "Warning: gitleaks not on PATH, using docker fallback."
            docker run --rm \
              -v "${{ github.workspace }}:/src" \
              -w /src \
              zricethezav/gitleaks:v8.30.0 \
              detect --redact=100 --source /src --config /src/.gitleaks.toml --log-opts="--branches --tags"
          fi

      # Non-Turbo checks (run before Turbo gates)
      - name: Check formatting
        run: pnpm format-check:root

      - name: Check markdown
        run: pnpm markdownlint-check:root

      - name: Validate sub-agents
        run: pnpm subagents:check

      - name: Validate portability
        run: pnpm portability:check

      - name: Run root-level script tests
        run: pnpm test:root-scripts

      - name: Lint shell scripts
        run: pnpm lint:shell

      - name: Install Playwright browsers for test:ui
        run: pnpm exec playwright install --with-deps chromium

      # Single Turbo invocation for all Turbo-managed gates
      - name: Build, type-check, lint, test
        id: turbo-run
        run: >-
          pnpm exec turbo run sdk-codegen build type-check lint test test:e2e
          test:ui smoke:dev:stub --summarize --log-order=grouped --continue

      # Run after build (knip + depcruise both resolve through built dist/ outputs)
      - name: Run knip (unused code detection)
        run: pnpm knip

      - name: Run depcruise (circular deps, orphans, layer violations)
        run: pnpm depcruise

      - name: Report Turbo summary
        if: always()
        run: pnpm exec tsx scripts/ci-turbo-report.ts >> "$GITHUB_STEP_SUMMARY"

      - name: Check schema cache drift (advisory)
        if: always()
        run: pnpm exec tsx scripts/ci-schema-drift-check.ts
