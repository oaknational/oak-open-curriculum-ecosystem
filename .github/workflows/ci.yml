name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Run linting
        # The semantic search app is linted during build on Vercel, no need to duplicate the linting here
        run: pnpm lint --only --filter=!@oaknational/open-curriculum-semantic-search

      - name: Run type checking
        run: pnpm type-check --only

      - name: Run tests
        run: pnpm test --only

      - name: Build project
        # The hosted MCP server and the semantic search app are built in Vercel, no need to duplicate the build here
        run: pnpm build --only --filter=!@oaknational/oak-curriculum-mcp-streamable-http --filter=!@oaknational/open-curriculum-semantic-search
