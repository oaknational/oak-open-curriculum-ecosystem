name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run secret scan
        run: |
          if command -v gitleaks >/dev/null 2>&1; then
            pnpm secrets:scan:all
          else
            echo "Warning: gitleaks not on PATH, using docker fallback."
            docker run --rm \
              -v "${{ github.workspace }}:/src" \
              -w /src \
              zricethezav/gitleaks:v8.30.0 \
              detect --redact=100 --source /src --config /src/.gitleaks.toml --log-opts="--branches --tags --full-history"
          fi

      - name: Build project
        run: pnpm build

      - name: Check formatting
        run: pnpm format-check:root

      - name: Check markdown
        run: pnpm markdownlint-check:root

      - name: Validate sub-agents
        run: pnpm subagents:check

      - name: Run linting
        run: pnpm lint
        continue-on-error: true

      - name: Run type checking
        run: pnpm type-check
        continue-on-error: true

      - name: Run tests (all workspaces except search-cli)
        run: turbo run --continue test --filter='!@oaknational/search-cli'

      - name: Diagnose search-cli test environment
        run: |
          echo "=== CI runner memory ==="
          free -h
          echo ""
          echo "=== CI runner CPUs ==="
          nproc
          echo ""
          echo "=== Node memory defaults ==="
          node -e "const v8 = require('v8'); console.log(JSON.stringify(v8.getHeapStatistics(), null, 2))"
          echo ""
          echo "=== search-cli test file count ==="
          find apps/oak-search-cli -type f \( -name '*.unit.test.ts' -o -name '*.integration.test.ts' \) ! -path '*/node_modules/*' ! -path '*/dist/*' | wc -l
          echo ""
          echo "=== search-cli vitest config ==="
          cat apps/oak-search-cli/vitest.config.ts

      - name: Run search-cli tests (isolated with diagnostics)
        timeout-minutes: 5
        working-directory: apps/oak-search-cli
        run: |
          echo "=== Starting search-cli tests at $(date -u +%H:%M:%S) ==="
          echo "=== Memory before tests ==="
          free -h

          # Monitor memory in background, logging every 10s
          (while true; do
            echo "[mem $(date -u +%H:%M:%S)] $(free -h | grep Mem | awk '{print "used=" $3 " free=" $4 " available=" $7}')"
            sleep 10
          done) &
          MEM_MONITOR_PID=$!

          # Monitor for OOM kills in background
          (dmesg -w 2>/dev/null | grep -i -E 'oom|kill|memory' || true) &
          DMESG_PID=$!

          # Run vitest with verbose reporter and heap usage logging
          # --reporter=verbose: prints each test file as it starts/finishes
          # --logHeapUsage: shows heap usage per test file
          # --testTimeout=30000: prevent individual tests from hanging forever
          NODE_OPTIONS='--max-old-space-size=6144' npx vitest run \
            --reporter=verbose \
            --logHeapUsage \
            --testTimeout=30000 \
            --no-color \
            2>&1; VITEST_EXIT=$?

          # Stop monitors
          kill $MEM_MONITOR_PID 2>/dev/null || true
          kill $DMESG_PID 2>/dev/null || true

          echo ""
          echo "=== search-cli tests finished at $(date -u +%H:%M:%S) with exit code $VITEST_EXIT ==="
          echo "=== Memory after tests ==="
          free -h

          exit $VITEST_EXIT
