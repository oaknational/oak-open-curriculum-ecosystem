name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run secret scan
        run: |
          if command -v gitleaks >/dev/null 2>&1; then
            pnpm secrets:scan:all
          else
            echo "Warning: gitleaks not on PATH, using docker fallback."
            docker run --rm \
              -v "${{ github.workspace }}:/src" \
              -w /src \
              zricethezav/gitleaks:v8.30.0 \
              detect --redact=100 --source /src --config /src/.gitleaks.toml --log-opts="--branches --tags --full-history"
          fi

      - name: Build project
        run: pnpm build

      - name: Check formatting
        run: pnpm format-check:root

      - name: Check markdown
        run: pnpm markdownlint-check:root

      - name: Validate sub-agents
        run: pnpm subagents:check

      - name: Run linting
        run: pnpm lint

      - name: Run type checking
        run: pnpm type-check

      - name: Run tests
        run: pnpm test
