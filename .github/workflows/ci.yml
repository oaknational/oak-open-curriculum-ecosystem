name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Debug ESLint config (oak-curriculum-mcp)
        continue-on-error: true
        run: |
          echo "Node/ESLint/TS versions:" && node -v && pnpm exec eslint -v && pnpm exec tsc -v
          echo "Effective ESLint config subset for oak-curriculum-mcp:"
          pnpm -C apps/oak-curriculum-mcp exec eslint --print-config src/tools/index.ts \
            | node -e '
                let s="";process.stdin.on("data",c=>s+=c);process.stdin.on("end",()=>{
                  const j=JSON.parse(s);
                  const out={
                    parserOptions:j.languageOptions?.parserOptions,
                    resolverTS:j.settings?.["import-x/resolver"]?.typescript,
                    rules:{
                      noUnsafeCall:j.rules?.["@typescript-eslint/no-unsafe-call"],
                      restrictTpl:j.rules?.["@typescript-eslint/restrict-template-expressions"]
                    }
                  };
                  console.log(JSON.stringify(out,null,2));
                });
              '

      - name: Run linting
        run: pnpm lint --only

      - name: Run type checking
        run: pnpm type-check --only

      - name: Run tests
        run: pnpm test --only

      - name: Build project
        run: pnpm build --only
