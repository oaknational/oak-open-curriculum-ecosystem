title = "oak-open-curriculum-ecosystem gitleaks config"
minVersion = "8.30.0"

[extend]
useDefault = true

# `.agent/reference/**` is third-party reference material. It can contain
# example tokens/keys that look like secrets; we intentionally ignore it.
[[allowlists]]
description = "Ignore third-party reference docs (.agent/reference/**)"
paths = ['''^\.agent/reference/''']

# Clerk publishable keys (`pk_test_...`, `pk_live_...`) are designed to be
# public — they are embedded in client-side code per Clerk's security model.
# They cannot be used to authenticate API calls or access private data.
[[allowlists]]
description = "Clerk publishable keys are public by design"
regexTarget = "match"
regexes = ['''pk_test_[A-Za-z0-9]+''', '''pk_live_[A-Za-z0-9]+''']

[[rules]]
id = "oak-api-key-uuid"
description = "Detect UUID-style OAK_API_KEY assignments"
regex = '''OAK_API_KEY=[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'''

[[rules]]
id = "notion-api-key-ntn-format"
description = "Detect Notion API keys with ntn_ prefix"
regex = '''NOTION_API_KEY=ntn_[A-Za-z0-9_-]{20,}'''
