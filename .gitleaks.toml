title = "oak-open-curriculum-ecosystem gitleaks config"
minVersion = "8.30.0"

[extend]
useDefault = true

# `.agent/reference/**` is third-party reference material. It can contain
# example tokens/keys that look like secrets; we intentionally ignore it.
[[allowlists]]
description = "Ignore third-party reference docs (.agent/reference/**)"
paths = ['''^\.agent/reference/''']

# Clerk publishable keys (`pk_test_...`, `pk_live_...`) are designed to be
# public — they are embedded in client-side code per Clerk's security model.
# They cannot be used to authenticate API calls or access private data.
[[allowlists]]
description = "Clerk publishable keys are public by design"
regexTarget = "match"
regexes = ['''pk_test_[A-Za-z0-9]+''', '''pk_live_[A-Za-z0-9]+''']

# Test fixture API keys in unit/integration tests are not real secrets.
# Pattern: 'oak-key-12345', 'elastic-key-12345', 'search-key-12345' etc.
[[allowlists]]
description = "Test fixture keys in test files"
paths = ['''\.test\.ts$''']

# SonarCloud issue/hotspot keys (e.g. `AZ3PzDg2qR2lgcKGwtUx`) are public
# identifiers used to reference Sonar findings via the Sonar MCP and REST
# APIs. They appear in collaboration-state records and plan-body
# documentation when describing Sonar interactions. They cannot
# authenticate API calls or access private data.
[[allowlists]]
description = "SonarCloud issue/hotspot keys are public identifiers"
regexTarget = "match"
regexes = ['''AZ[0-9A-Za-z_-]{15,30}''']

# Git commit SHAs explicitly prefixed with `SHA:` are audit references
# in collaboration content (comms events, shared-comms-log, claim notes,
# handoff records, napkin entries, plans, threads). The prefix is the
# agent's discipline marker declaring intent; gitleaks honours it.
# See `.agent/rules/sha-prefix-in-collaboration-content.md`.
[[allowlists]]
description = "SHA-prefixed git commit hashes are audit references, not credentials"
regexTarget = "line"
regexes = ['''SHA: ?[0-9a-f]{7,40}\b''']

# Commit-specific allowlist for the 2026-05-23 owner-directed wide-sweep
# commit. The wide-sweep landed pre-existing collaboration content that
# pre-dates the SHA-prefix rule; this allowlist narrowly exempts that
# single commit from the gitleaks scan so the push completes without a
# history rewrite. Subsequent commits authored under the new rule use
# the `SHA:` prefix and are honoured by the regex allowlist above.
[[allowlists]]
description = "Wide-sweep commit (SHA:1ea4e2e15e1abc4ac2790d3e01632e6622f8ed8a) pre-dates SHA-prefix rule"
commits = ["1ea4e2e15e1abc4ac2790d3e01632e6622f8ed8a"]

[[rules]]
id = "oak-api-key-uuid"
description = "Detect UUID-style OAK_API_KEY assignments"
regex = '''OAK_API_KEY=[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'''

[[rules]]
id = "notion-api-key-ntn-format"
description = "Detect Notion API keys with ntn_ prefix"
regex = '''NOTION_API_KEY=ntn_[A-Za-z0-9_-]{20,}'''
