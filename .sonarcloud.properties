# SonarQube Cloud automatic analysis configuration.
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis#additional-analysis-configuration
#
# Keep this CPD block in sync with sonar-project.properties and
# docs/governance/sonar-disposition-policy.md. Automatic analysis does not
# read sonar-project.properties, so the duplication-denominator scope needs
# to be present here as well.
#
# Agent tooling source remains in the CPD corpus. Only generated artefacts,
# tests, package-local config shapes, and external-source data snapshots (the
# `*.external-data.ts` convention) are excluded.
sonar.cpd.exclusions=**/src/types/generated/**,**/*.test.ts,**/*.test.tsx,**/tests/**,**/e2e-tests/**,**/*.config.*,packages/sdks/oak-sdk-codegen/src/types/generated/api-schema/**,**/*.external-data.ts
