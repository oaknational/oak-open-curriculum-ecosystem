packages:
  - agent-tools
  - apps/oak-curriculum-mcp-streamable-http
  - apps/oak-search-cli
  - packages/core/oak-eslint
  - packages/core/observability
  - packages/core/openapi-zod-client-adapter
  - packages/core/build-metadata
  - packages/core/env
  - packages/core/graph-core
  - packages/core/result
  - packages/core/type-helpers
  - packages/design/*
  - packages/libs/env-resolution
  - packages/libs/graph-ingest
  - packages/libs/graph-project
  - packages/libs/logger
  - packages/libs/sentry-node
  - packages/libs/search-contracts
  - packages/sdks/graph-corpus-sdk
  - packages/sdks/oak-curriculum-sdk
  - packages/sdks/oak-sdk-codegen
  - packages/sdks/oak-search-sdk

allowBuilds:
  '@clerk/shared': true
  '@sentry/cli': true
  esbuild: true
  unrs-resolver: true
  core-js: true
  sharp: true
peerDependencyRules:
  allowedVersions:
    eslint-plugin-import>eslint: '10'
    eslint-plugin-import-x>eslint: '10'
    eslint-plugin-react>eslint: '10'
    eslint-plugin-react-hooks>eslint: '10'
overrides:
  axios: '>=1.15.1'
  brace-expansion: '>=5.0.5'
  csstype: '>=3.2.3'
  file-type: '>=21.3.2'
  follow-redirects: '>=1.15.12'
  hono: '>=4.12.16'
  '@hono/node-server': '>=1.19.10'
  js-yaml: '>=4.1.1'
  picomatch: '>=4.0.4'
  qs: '>=6.14.2'
  rollup: '>=4.59.0'
  sucrase: '>=3.35.1'
