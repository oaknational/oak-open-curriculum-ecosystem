<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Oak MCP App</title>
    <script>
      // Set data-theme and color-scheme from OS preference before React
      // hydrates. The MCP host overrides both via applyDocumentTheme()
      // when it provides a theme context. Priority: host > this fallback.
      (function () {
        var d = document.documentElement;
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          d.setAttribute('data-theme', 'dark');
          d.style.colorScheme = 'dark';
        } else {
          d.setAttribute('data-theme', 'light');
          d.style.colorScheme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root" data-mcp-app="oak-curriculum"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
