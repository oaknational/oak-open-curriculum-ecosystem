<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Oak National Academy</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
        /* Safe area insets - updated by JavaScript from window.openai.safeArea */
        --safe-top: 20px;
        --safe-right: 20px;
        --safe-bottom: 20px;
        --safe-left: 20px;
        /* Oak brand colors */
        --bg: #bef2bd;
        --fg: #1a3a1b;
        --fg-secondary: #3d5e3e;
        --accent: #287d3c;
        --accent-high-contrast: #1b6330;
        --item-bg: rgba(255, 255, 255, 0.5);
        --item-border: rgba(27, 61, 28, 0.1);
        --code-bg: rgba(0, 0, 0, 0.12);
        --border-color: rgba(27, 61, 28, 0.15);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1b3d1c;
          --fg: #f0f7f0;
          --fg-secondary: #b8dab9;
          --accent: #8cd98f;
          --accent-high-contrast: #8cd98f;
          --item-bg: rgba(0, 0, 0, 0.2);
          --item-border: rgba(240, 247, 240, 0.1);
          --code-bg: rgba(255, 255, 255, 0.1);
          --border-color: rgba(240, 247, 240, 0.15);
        }
      }
      html {
        box-sizing: border-box;
      }
      *,
      *::before,
      *::after {
        box-sizing: inherit;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Lexend', system-ui, sans-serif;
        min-height: 200px;
        display: flex;
        flex-direction: column;
      }
      #root {
        background: var(--bg);
        color: var(--fg);
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      #content-container {
        margin: 0.8em;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .hdr {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 2px solid var(--border-color);
      }
      .hdr-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .logo {
        width: 36px;
        height: 47px;
      }
      .ttl {
        font-weight: 600;
        font-size: 16px;
        margin: 0;
      }
      .sub-ttl {
        font-size: 12px;
        color: var(--fg-secondary);
        margin: 0;
      }
      #c {
        flex: 1;
      }
      .sec {
        margin-bottom: 16px;
      }
      .sec-ttl {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin: 0 0 10px;
        color: var(--fg-secondary);
      }
      .list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .item {
        background: var(--item-bg);
        border-radius: 8px;
        padding: 12px;
        border: 1px solid var(--item-border);
      }
      .item-ttl {
        font-weight: 500;
        font-size: 14px;
        margin: 0 0 4px;
      }
      .meta {
        font-size: 12px;
        color: var(--fg-secondary);
        margin: 0;
      }
      .link {
        color: var(--accent);
        text-decoration: none;
        font-size: 12px;
        font-weight: 500;
      }
      .badge {
        background: var(--accent);
        color: white;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        margin-left: 8px;
      }
      @media (prefers-color-scheme: dark) {
        .badge {
          color: #1b3d1c;
        }
      }
      pre {
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 12px;
        line-height: 1.5;
        margin: 0;
        font-family: monospace;
        background: var(--code-bg);
        padding: 12px;
        border-radius: 8px;
      }
      code {
        background: var(--code-bg);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
      }
      .empty {
        text-align: center;
        padding: 24px;
        color: var(--fg-secondary);
        font-size: 14px;
      }
      .ftr {
        margin-top: auto;
        padding-top: 12px;
        border-top: 1px solid var(--border-color);
        font-size: 11px;
        color: var(--fg-secondary);
        text-align: center;
      }
      .ftr-disclaimer {
        margin: 0 0 8px;
      }
      .ftr-links {
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 4px 8px;
      }
      .ftr-link {
        color: var(--accent-high-contrast);
        text-decoration: none;
        font-weight: 600;
        text-align: center;
      }
      .ftr-link:hover {
        text-decoration: underline;
      }
      .ftr-sep {
        opacity: 0.5;
      }
      .nowrap {
        white-space: nowrap;
      }
      @media (max-width: 480px) {
        .ftr-links {
          flex-direction: column;
          gap: 0;
        }
        .ftr-sep {
          display: none;
        }
        .ftr-link {
          padding-top: 8px;
          border-top: 1px solid var(--border-color);
        }
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .btn {
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: opacity 0.2s;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      @media (prefers-color-scheme: dark) {
        .btn {
          color: #1b3d1c;
        }
      }
      .loading {
        opacity: 0.6;
        pointer-events: none;
      }
      .error {
        background: rgba(200, 50, 50, 0.1);
        color: #c83232;
        padding: 12px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 12px;
      }
      @media (prefers-color-scheme: dark) {
        .error {
          background: rgba(255, 100, 100, 0.15);
          color: #ff9999;
        }
      }
      .cta-container {
        margin-left: auto;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .cta-btn {
        background: var(--item-bg);
        color: var(--fg);
        font-size: 12px;
        padding: 8px 14px;
        border-radius: 6px;
        border: 2px solid var(--accent-high-contrast);
        white-space: nowrap;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        transition:
          background 0.15s,
          transform 0.1s,
          box-shadow 0.1s;
      }
      .cta-btn:hover {
        background: var(--code-bg);
      }
      .cta-btn:active {
        transform: scale(0.94);
        background: var(--accent-high-contrast);
        color: #fff;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
      }
      .cta-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }
    </style>

    <script>
      window.openai = {
        toolOutput: {
          serverOverview: {
            name: 'Oak Curriculum MCP Server',
            version: '1.0.0',
            aboutOak:
              "Oak National Academy is the UK's national curriculum body, providing free, high-quality, fully-resourced curriculum resources for teachers and students.",
            oakWebsite: 'https://www.thenational.academy',
            description:
              'Access Oak National Academy curriculum resources including lessons, units, quizzes, transcripts, and teaching materials.',
          },
          toolCategories: {
            discovery: {
              description: 'Find curriculum content by searching or listing.',
              tools: ['search', 'get-subjects', 'get-key-stages'],
            },
            browsing: {
              description: 'Explore curriculum structure systematically.',
              tools: ['get-key-stages-subject-units', 'get-key-stages-subject-lessons'],
            },
            fetching: {
              description: 'Get detailed content for specific lessons or units.',
              tools: ['fetch', 'get-lessons-summary', 'get-lessons-transcript'],
            },
          },
          tips: [
            'Use "search" for free-text queries; use browsing tools for structured exploration.',
            'The "fetch" tool uses prefixed IDs: lesson:slug, unit:slug, thread:slug.',
            'Get lesson transcript for detailed content understanding.',
          ],
        },
        toolResponseMetadata: {
          'annotations/title': 'Get Help',
        },
        safeArea: { insets: { top: 24, right: 24, bottom: 120, left: 24 } },
        theme: 'light',
        displayMode: 'inline',
        locale: 'en-US',
        maxHeight: 600,
      };
    </script>
  </head>

              />
            </svg>
          </div>
          <div class="hdr-text">
            <h1 class="ttl">Oak National Academy</h1>
            <p class="sub-ttl" id="tool-name"></p>
          </div>
          <div id="cta-container" class="cta-container" style="display: none">
            <button id="learn-oak-btn" class="btn cta-btn">Load Oak Knowledge (Click Me)</button>
          </div>
        </header>
        <div id="c"></div>
        <footer class="ftr">
          <p class="ftr-disclaimer">
            AI can make mistakes. Check all generated resources before use.
          </p>
          <p class="ftr-links">
            <a
              href="https://www.thenational.academy"
              target="_blank"
              rel="noopener noreferrer"
              class="ftr-link nowrap"
              >Explore more Oak curriculum resources</a
            >
            <span class="ftr-sep">•</span>
            <a
              href="https://labs.thenational.academy"
              target="_blank"
              rel="noopener noreferrer"
              class="ftr-link"
              ><span class="nowrap">For an educator specific experience try Aila</span> -
              <span class="nowrap">Oak's AI Lesson Assistant</span></a
            >
          </p>
        </footer>
      </main>

      const c = document.getElementById('c');
      const toolNameEl = document.getElementById('tool-name');

        'get-search-lessons': 'search',
        'get-search-transcripts': 'search',
        'fetch': 'fetch',
        'get-ontology': 'ontology',
        'get-knowledge-graph': 'knowledgeGraph'
      };

      // ========================================
      // Widget State Persistence
      // ========================================
      let widgetState = window.openai?.widgetState ?? {
        expandedSections: [],
        scrollPosition: 0,
      };

      function updateWidgetState(newState) {
        widgetState = { ...widgetState, ...newState };
        if (window.openai?.setWidgetState) {
          window.openai.setWidgetState(widgetState);
        }
      }

      function restoreScrollPosition() {
        if (widgetState.scrollPosition > 0) {
          requestAnimationFrame(() => {
            document.documentElement.scrollTop = widgetState.scrollPosition;
          });
        }
      }

      document.addEventListener('scroll', () => {
        updateWidgetState({ scrollPosition: document.documentElement.scrollTop });
      }, { passive: true });

      // ========================================
      // Locale Support
      // ========================================
      const locale = window.openai?.locale ?? 'en-GB';

      function formatDate(dateStr) {
        try {
          return new Intl.DateTimeFormat(locale, { dateStyle: 'medium' }).format(new Date(dateStr));
        } catch {
          return dateStr;
        }
      }

      // ========================================
      // External Links
      // ========================================
      function openOnOakWebsite(event, url) {
        if (event) event.preventDefault();
        if (window.openai?.openExternal) {
          window.openai.openExternal({ href: url });
        } else {
          window.open(url, '_blank', 'noopener,noreferrer');
        }
      }

      // ========================================
      // Display Mode
      // ========================================
      function requestFullscreen() {
        if (window.openai?.requestDisplayMode) {
          window.openai.requestDisplayMode('fullscreen').catch(() => {});
        }
      }


      // ========================================
      // CTA (Call-to-Action) System
      // ========================================
      const CTA_CONFIGS = [
        {
          id: 'learn-oak',
          buttonText: 'Load Oak Knowledge (Click Me)',
          loadingText: 'Understanding Oak...',
          understoodText: 'Oak Understood',
          prompt: `The Oak Open Curriculum is an open source, high quality, free to use, fully resourced curriculum covering from EYFS to KS4.

      In order for you to better help the user, some resources and tools have been provided for that specific purpose.

      First, call the \`get-help\` tool to get an overview of the resources and tools that have been provided.

      The response from that tool should include other tools in the "agent support" category, including but not necessarily limited to \`get-ontology\`, and \`get-knowledge-graph\`. Call those tools now.

      Reflect on the information from all three tools. There is no need to show the user the information, just use it to better understand the Oak curriculum and how to best help the user.

      Tell the user that you are ready to help them use the Oak Open Curriculum resources.`,
        }
      ];

      function initCtaButtons() {
        const ctaContainer = document.getElementById('cta-container');
        if (!window.openai?.sendFollowUpMessage) {
          if (ctaContainer) ctaContainer.style.display = 'none';
          return;
        }

        if (ctaContainer) ctaContainer.style.display = 'flex';
        CTA_CONFIGS.forEach(cta => {
          const btn = document.getElementById(cta.id + '-btn');
          if (!btn) return;
          btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.textContent = cta.loadingText;
            try {
              await window.openai.sendFollowUpMessage({ prompt: cta.prompt });
              // Show understood state after 10 seconds, keep button disabled
              setTimeout(() => {
                btn.textContent = cta.understoodText;
              }, 10000);
            } catch (error) {
              btn.textContent = cta.buttonText;
              btn.disabled = false;
              console.error('Failed to send follow-up message:', error);
            }
          });
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initCtaButtons);
      } else {
        initCtaButtons();
      }

      // ========================================
      // Safe Area Insets
      // ========================================
      function applySafeAreaInsets() {
        const safeArea = window.openai?.safeArea;
        if (safeArea?.insets) {
          const { top, right, bottom, left } = safeArea.insets;
          document.documentElement.style.setProperty('--safe-top', `${top}px`);
          document.documentElement.style.setProperty('--safe-right', `${right}px`);
          document.documentElement.style.setProperty('--safe-bottom', `${bottom}px`);
          document.documentElement.style.setProperty('--safe-left', `${left}px`);
        }
        // If no safe area insets, CSS fallback values (20px) are used
      }

      // ========================================
      // Renderer Functions
      // ========================================
      /**
       * Escapes HTML entities to prevent XSS.
       */
      function esc(s) {
        if (typeof s !== 'string') return '';
        return s.replace(/&/g,'&amp;').replace(/<\/g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      /**
       * Renders a section container with title and optional badge.
       */
      function renderSection(title, content, badgeCount) {
        const badge = badgeCount !== undefined ? '<span class="badge">' + badgeCount + '<\/span>' : '';
        return '<div class="sec"><h2 class="sec-ttl">' + esc(title) + badge + '<\/h2>' + content + '<\/div>';
      }

      /**
       * Renders an item card with title and optional metadata.
       */
      function renderItem(title, meta, link) {

      function renderEntityList(data) {
        // Handle both array and object with results array
        const items = Array.isArray(data) ? data : (data.results || data.items || []);

        if (!Array.isArray(items) || items.length === 0) {
          return '<div class="empty">No items found.<\/div>';
        }

        const first = items[0] || {};

        // Detect entity type from properties
        let entityType = 'Items';
        let titleProp = 'title';
        let slugProp = 'slug';

        if (first.keyStageTitle || first.keyStageSlug) {
          entityType = 'Key Stages';
          titleProp = 'keyStageTitle';
          slugProp = 'keyStageSlug';
        } else if (first.subjectTitle || first.subjectSlug) {
          entityType = 'Subjects';
          titleProp = 'subjectTitle';
          slugProp = 'subjectSlug';
        } else if (first.lessonTitle || first.lessonSlug) {
          entityType = 'Lessons';
          titleProp = 'lessonTitle';
          slugProp = 'lessonSlug';
        } else if (first.unitTitle || first.unitSlug) {
          entityType = 'Units';
          titleProp = 'unitTitle';
          slugProp = 'unitSlug';
        } else if (first.threadTitle || first.threadSlug) {
          entityType = 'Threads';
          titleProp = 'threadTitle';
          slugProp = 'threadSlug';
        } else if (first.sequenceSlug) {
          entityType = 'Sequences';
          titleProp = 'sequenceSlug';
          slugProp = 'sequenceSlug';
        } else if (first.year !== undefined) {
          entityType = 'Years';
          titleProp = 'year';
        } else if (first.title) {
          entityType = 'Items';
          titleProp = 'title';
          slugProp = 'slug';
        }

        let h = '<div class="sec"><h2 class="sec-ttl">' + esc(entityType) + '<span class="badge">' + items.length + '<\/span><\/h2><div class="list">';

        const maxItems = 10;
        const displayItems = items.slice(0, maxItems);

        displayItems.forEach(item => {
          const title = item[titleProp] || item.title || item.slug || item.name || 'Untitled';
          const displayTitle = titleProp === 'year' ? 'Year ' + title : title;

          // Build metadata line
          const metaParts = [];
          if (item.subjectTitle && titleProp !== 'subjectTitle') metaParts.push(item.subjectTitle);
          if (item.keyStageTitle && titleProp !== 'keyStageTitle') metaParts.push(item.keyStageTitle);
          if (item.keyStage) metaParts.push(item.keyStage);
          if (item.year && titleProp !== 'year') metaParts.push('Year ' + item.year);
          if (item.phaseTitle) metaParts.push(item.phaseTitle);
          if (item.order !== undefined) metaParts.push('Order: ' + item.order);

          const meta = metaParts.join(' • ');
          const url = item.canonicalUrl || '';

          h += '<div class="item"><p class="item-ttl">' + esc(displayTitle) + '<\/p>';
          if (meta) h += '<p class="meta">' + esc(meta) + '<\/p>';

          // Key stages within subjects/sequences
          if (item.keyStages && Array.isArray(item.keyStages) && item.keyStages.length > 0) {
            const ksNames = item.keyStages.map(ks => ks.keyStageTitle || ks.title || ks).join(', ');
            h += '<p class="meta">Key Stages: ' + esc(ksNames) + '<\/p>';
          }

          // Years within subjects/sequences
          if (item.years && Array.isArray(item.years) && item.years.length > 0 && titleProp !== 'year') {
            const yearRange = 'Years ' + Math.min(...item.years) + '-' + Math.max(...item.years);
            h += '<p class="meta">' + esc(yearRange) + '<\/p>';
          }

          // Units within year groups
          if (item.units && Array.isArray(item.units) && item.units.length > 0) {
            h += '<p class="meta">' + item.units.length + ' units<\/p>';
          }

          if (url) h += '<a class="link" href="' + esc(url) + '" target="_blank" onclick="openOnOakWebsite(event, \'' + esc(url) + '\')">View on Oak →<\/a>';
          h += '<\/div>';
        });

        if (items.length > maxItems) {
          h += '<p class="meta" style="text-align:center;margin-top:8px">+' + (items.length - maxItems) + ' more<\/p>';
        }

        h += '<\/div><\/div>';
        return h;
      }

          h += '<div class="sec" style="margin-top:16px;padding-top:16px;border-top:1px solid #e0e0e0">';
          h += '<a class="link" href="' + esc(data.canonicalUrl) + '" target="_blank" onclick="openOnOakWebsite(event, \'' + esc(data.canonicalUrl) + '\')">View original Oak resource →<\/a>';
          h += '<\/div>';
        }

        return h;

      function renderAssetItem(a) {
        const type = a.type || a.assetType || 'file';
        const icons = { video: '🎬', image: '🖼️', document: '📄', audio: '🎵', pdf: '📑', worksheet: '📝', slideDeck: '📊', default: '📎' };
        const icon = icons[type] || icons.default;
        const title = a.title || a.name || type;
        const url = a.downloadUrl || a.url || '';

        let item = '<p class="item-ttl">' + icon + ' ' + esc(title) + '<\/p>';
        if (a.format) item += '<p class="meta">' + esc(a.format.toUpperCase()) + '<\/p>';
        if (url) item += '<a class="link" href="' + esc(url) + '" target="_blank">Download →<\/a>';
        return item;
      }

      function renderChangelog(data) {
        let h = '';

        // Normalize to array
        const entries = Array.isArray(data) ? data : [data];

        if (entries.length === 0 || !entries[0].version) {
          return '<div class="empty">No changelog data available.<\/div>';
        }

        h += '<div class="sec"><h2 class="sec-ttl">Changelog<span class="badge">' + entries.length + ' versions<\/span><\/h2><div class="list">';

        entries.slice(0, 5).forEach(entry => {
          h += '<div class="item changelog-entry">';
          h += '<p class="item-ttl"><span class="version-badge">v' + esc(entry.version || '') + '<\/span>';
          if (entry.date) h += ' <span class="meta">' + esc(entry.date) + '<\/span>';
          h += '<\/p>';

          if (entry.changes && Array.isArray(entry.changes) && entry.changes.length > 0) {
            h += '<ul class="changes-list" style="margin:8px 0 0;padding-left:20px;font-size:13px">';
            entry.changes.forEach(change => {
              h += '<li style="margin-bottom:4px">' + esc(change) + '<\/li>';
            });
            h += '<\/ul>';
          }
          h += '<\/div>';
        });

        if (entries.length > 5) {
          h += '<p class="meta" style="text-align:center;margin-top:8px">+' + (entries.length - 5) + ' older versions<\/p>';
        }

        h += '<\/div><\/div>';
        return h;

      function renderRateLimit(data) {
        let h = '';

        const remaining = data.remaining ?? 0;
        const limit = data.limit ?? 0;
        const used = limit - remaining;
        const percent = limit > 0 ? Math.round((used / limit) * 100) : 0;

        h += '<div class="sec"><h2 class="sec-ttl">Rate Limit Status<\/h2>';

        // Progress bar
        const barColor = percent > 80 ? '#e74c3c' : (percent > 50 ? '#f39c12' : '#27ae60');
        h += '<div class="rate-limit-bar" style="background:#eee;border-radius:8px;height:24px;margin:12px 0;overflow:hidden">';
        h += '<div style="background:' + barColor + ';height:100%;width:' + percent + '%;transition:width 0.3s"><\/div>';
        h += '<\/div>';

        // Stats
        h += '<div style="display:flex;justify-content:space-between;font-size:14px">';
        h += '<span><strong>Used:<\/strong> ' + used + ' / ' + limit + '<\/span>';
        h += '<span><strong>Remaining:<\/strong> ' + remaining + '<\/span>';
        h += '<\/div>';

        // Reset time
        if (data.reset) {
          let resetText = data.reset;
          if (typeof data.reset === 'number') {
            try {
              resetText = new Date(data.reset * 1000).toLocaleTimeString();
            } catch (e) {
              resetText = String(data.reset);
            }
          }
          h += '<p class="meta" style="margin-top:12px;text-align:center">Resets at: ' + esc(resetText) + '<\/p>';
        }

        h += '<\/div>';
        return h;
      }

      function renderOntology(o) {

        h += '<\/div><\/div>';

        // Key Stages summary
        if (o.curriculumStructure?.keyStages) {
          const ks = o.curriculumStructure.keyStages;
          h += '<div class="sec"><h2 class="sec-ttl">Key Stages<span class="badge">' + ks.length + '<\/span><\/h2><div class="list">';
          ks.forEach(k => {
            h += '<div class="item"><p class="item-ttl">' + esc(k.name) + ' (' + esc(k.slug) + ')<\/p>';
            h += '<p class="meta">' + esc(k.phase) + ' \u2022 Ages ' + esc(k.ageRange) + ' \u2022 Years ' + (k.years || []).join(', ') + '<\/p>';
            if (k.description) h += '<p class="meta">' + esc(k.description) + '<\/p>';
            h += '<\/div>';
          });
          h += '<\/div><\/div>';
        }

        // Entity Hierarchy
        if (o.entityHierarchy?.levels) {
          h += '<div class="sec"><h2 class="sec-ttl">Content Hierarchy<\/h2>';
          h += '<p style="margin:0 0 8px;font-size:13px;color:#666">' + esc(o.entityHierarchy.description || 'Curriculum content is organised in a hierarchy') + '<\/p>';
          h += '<div class="list">';
          o.entityHierarchy.levels.forEach(lvl => {
            h += '<div class="item"><p class="item-ttl">' + esc(lvl.entity) + '<\/p>';
            h += '<p class="meta">Contains: ' + esc(lvl.contains || '') + '<\/p>';
            if (lvl.example) h += '<p class="meta">Example: <code>' + esc(lvl.example) + '<\/code><\/p>';
            h += '<\/div>';
          });
          h += '<\/div><\/div>';
        }

        // Threads concept
        if (o.threads) {
          h += '<div class="sec"><h2 class="sec-ttl">Threads<\/h2>';
          h += '<p style="margin:0 0 8px;font-size:13px">' + esc(o.threads.definition || '') + '<\/p>';
          if (o.threads.importance) h += '<p style="margin:0 0 8px;font-size:13px;font-style:italic">' + esc(o.threads.importance) + '<\/p>';
          if (o.threads.examples?.length) {
            h += '<div class="list">';
            o.threads.examples.slice(0,3).forEach(ex => {
              h += '<div class="item"><p class="item-ttl">' + esc(ex.slug) + ' (' + esc(ex.subject) + ')<\/p>';
              h += '<p class="meta">' + esc(ex.spans || '') + '<\/p>';
              if (ex.progression) h += '<p class="meta">' + esc(ex.progression) + '<\/p>';
              h += '<\/div>';
            });
            h += '<\/div>';
          }
          h += '<\/div>';
        }

        // Tool workflows summary
        if (o.workflows) {
          const workflows = Object.entries(o.workflows);
          if (workflows.length > 0) {
            h += '<div class="sec"><h2 class="sec-ttl">Workflows<span class="badge">' + workflows.length + '<\/span><\/h2><div class="list">';
            workflows.forEach(([, wf]) => {
              if (wf.title || wf.description) {
                h += '<div class="item"><p class="item-ttl">' + esc(wf.title || wf.description) + '<\/p>';
                if (wf.description && wf.title) h += '<p class="meta">' + esc(wf.description) + '<\/p>';
                if (wf.steps?.length) h += '<p class="meta">' + wf.steps.length + ' steps<\/p>';
                h += '<\/div>';
              }
            });
            h += '<\/div><\/div>';
          }
        }

        return h || '<div class="empty">No ontology data available.<\/div>';
      }

      function renderKnowledgeGraph(data) {
        let h = '';
        h += '<div class="sec"><h2 class="sec-ttl">Oak Knowledge Graph<\/h2>';
        h += '<p style="margin:0 0 12px;font-size:14px">Schema-level graph showing how curriculum concept types relate to each other.<\/p>';
        h += '<\/div>';
        h += '<div class="sec">';
        h += '<p style="margin:0 0 12px;font-size:14px;color:var(--accent);font-weight:600">✓ Knowledge graph loaded successfully<\/p>';
        h += '<\/div>';
        h += '<div class="sec">';
        h += '<details style="border:1px solid var(--border-color);border-radius:8px;padding:12px">';
        h += '<summary style="cursor:pointer;font-size:13px;font-weight:500;color:var(--fg-secondary)">Graph overview (18 key concepts)<\/summary>';
        h += '<div style="margin-top:12px;text-align:center">';
        h += KNOWLEDGE_GRAPH_OVERVIEW_SVG;
        h += '<p style="margin:8px 0 0;font-size:11px;color:var(--fg-secondary);font-style:italic">Hover over nodes for definitions, edges for relationships • Solid: explicit • Dashed: inferred<\/p>';
        h += '<\/div>';
        h += '<\/details>';
        h += '<\/div>';
        h += '<div class="sec">';
        h += '<details style="border:1px solid var(--border-color);border-radius:8px;padding:12px">';
        h += '<summary style="cursor:pointer;font-size:13px;font-weight:500;color:var(--fg-secondary)">Full graph (28 concepts, 45 edges)<\/summary>';
        h += '<div style="margin-top:12px;text-align:center">';
        h += KNOWLEDGE_GRAPH_FULL_SVG;
        h += '<p style="margin:8px 0 0;font-size:11px;color:var(--fg-secondary);font-style:italic">Hover over edges to see relationship names • All concepts from knowledge-graph-data.ts<\/p>';
        h += '<\/div>';
        h += '<\/details>';
        h += '<\/div>';
        return h || '<div class="empty">No knowledge graph data available.<\/div>';
      }

      // Renderer dispatcher - maps renderer IDs to functions
      const RENDERERS = {
        help: renderHelp,
        search: renderSearch,
        fetch: renderFetch,
        quiz: renderQuiz,
        entitySummary: renderEntitySummary,
        entityList: renderEntityList,
        transcript: renderTranscript,
        assets: renderAssets,
        changelog: renderChangelog,
        rateLimit: renderRateLimit,
        ontology: renderOntology,
        knowledgeGraph: renderKnowledgeGraph,
      };

      // ========================================
      // Rendering
      // ========================================
      function updateToolName() {
        const input = window.openai?.toolInput;
        const meta = window.openai?.toolResponseMetadata;
        // Use annotations/title from MCP tool metadata (canonical human-readable name)
        const displayName = meta?.['annotations/title'] || meta?.title || '';
        if (displayName && toolNameEl) { toolNameEl.textContent = displayName; toolNameEl.style.display = 'block'; }
        else if (toolNameEl) { toolNameEl.style.display = 'none'; }
      }

      function getFullResults() {
        const meta = window.openai?.toolResponseMetadata ?? {};
        const output = window.openai?.toolOutput ?? {};
        if (meta.fullResults) return meta.fullResults;
        if (output.data && typeof output.data === 'object') return output.data;
        return output;
      }

      function getToolName() {
        const input = window.openai?.toolInput;
        const meta = window.openai?.toolResponseMetadata;
        return meta?.toolName || input?.toolName || null;
      }

      function getRendererForTool(toolName) {
        if (!toolName) return null;
        const rendererId = TOOL_RENDERER_MAP[toolName];
        if (!rendererId) return null;
        return RENDERERS[rendererId] || null;
      }

      function render() {
        updateToolName();
        // NOTE: updateActions() was removed - see widget-script-state.ts for refresh button code
        const fullData = getFullResults();
        const toolName = getToolName();
        const renderer = getRendererForTool(toolName);
        const rendererId = toolName ? TOOL_RENDERER_MAP[toolName] : null;
        if (renderer) {
          c.innerHTML = renderer(fullData);
        } else if (fullData.serverOverview || fullData.toolCategories || fullData.workflows) {
          c.innerHTML = renderHelp(fullData);
        } else if (fullData.lessons !== undefined || fullData.transcripts !== undefined) {
          c.innerHTML = renderSearch(fullData);
        } else if (fullData.type && fullData.data !== undefined) {
          c.innerHTML = renderFetch(fullData);
        } else if (Object.keys(fullData).length > 0) { // eslint-disable-line no-restricted-properties -- REFACTOR
          c.innerHTML = '<pre>' + esc(JSON.stringify(fullData, null, 2)) + '<\/pre>';
        } else {
          c.innerHTML = '<div class="empty">Loading...<\/div>';
        }
        restoreScrollPosition();
      }

      applySafeAreaInsets();
      render();
      window.addEventListener('openai:set_globals', (e) => {
        const globals = e.detail?.globals;
        if (globals?.toolOutput !== undefined) render();
        if (globals?.safeArea !== undefined) applySafeAreaInsets();
      }, { passive: true });
