sonar.organization=oaknational
sonar.host.url=https://sonarcloud.io

# ---------------------------------------------------------------------------
# Sonar Disposition Policy — mechanical encoding (test-fixture exemptions)
# ---------------------------------------------------------------------------
#
# This block encodes the SAFE-by-class policy entries from
# docs/governance/sonar-disposition-policy.md for three rule classes whose
# decision criteria reduce cleanly to (rule × test-file path glob).
#
# Scope is deliberately narrow:
#   - Only S5443 (publicly-writable dirs), S5332 (clear-text protocols), and
#     S1313 (hardcoded IPs) are encoded here.
#   - Only test-file path globs are exempted. Production code paths still get
#     full rule coverage. Test files still get all OTHER rules.
#   - All other Sonar hotspot rule classes (S5852, S4036, S2245, S1523, S4790,
#     S5689, etc.) require human review per the policy.
#
# This is NOT a license to disable rules. It is the mechanical encoding of
# decisions that the policy already makes. Any expansion of this block
# (new rules, new path globs) requires a corresponding amendment to the
# policy doc first.
#
# Policy authority: docs/governance/sonar-disposition-policy.md
# Repository discipline: .agent/rules/never-disable-checks.md

sonar.issue.ignore.multicriteria=s5443t1,s5443t2,s5443t3,s5443t4,s5332t1,s5332t2,s5332t3,s5332t4,s5332t5,s5332t6,s1313t1,s1313t2,s1313t3,s1313t4

# S5443 — publicly-writable directories (e.g. /tmp) in test fixtures
sonar.issue.ignore.multicriteria.s5443t1.ruleKey=typescript:S5443
sonar.issue.ignore.multicriteria.s5443t1.resourceKey=**/*.test.ts
sonar.issue.ignore.multicriteria.s5443t2.ruleKey=typescript:S5443
sonar.issue.ignore.multicriteria.s5443t2.resourceKey=**/*.test.tsx
sonar.issue.ignore.multicriteria.s5443t3.ruleKey=typescript:S5443
sonar.issue.ignore.multicriteria.s5443t3.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.s5443t4.ruleKey=typescript:S5443
sonar.issue.ignore.multicriteria.s5443t4.resourceKey=**/e2e-tests/**

# S5332 — clear-text protocols (http://) in test fixtures and test-runner configs
sonar.issue.ignore.multicriteria.s5332t1.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.s5332t1.resourceKey=**/*.test.ts
sonar.issue.ignore.multicriteria.s5332t2.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.s5332t2.resourceKey=**/*.test.tsx
sonar.issue.ignore.multicriteria.s5332t3.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.s5332t3.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.s5332t4.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.s5332t4.resourceKey=**/e2e-tests/**
sonar.issue.ignore.multicriteria.s5332t5.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.s5332t5.resourceKey=**/playwright.config.ts
sonar.issue.ignore.multicriteria.s5332t6.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.s5332t6.resourceKey=**/vitest*.config.ts

# S1313 — hardcoded IP addresses in test fixtures
sonar.issue.ignore.multicriteria.s1313t1.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.s1313t1.resourceKey=**/*.test.ts
sonar.issue.ignore.multicriteria.s1313t2.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.s1313t2.resourceKey=**/*.test.tsx
sonar.issue.ignore.multicriteria.s1313t3.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.s1313t3.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.s1313t4.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.s1313t4.resourceKey=**/e2e-tests/**

# ---------------------------------------------------------------------------
# Sonar Disposition Policy — Duplications (cpd.exclusions)
# ---------------------------------------------------------------------------
#
# Sonar's copy-paste detector (cpd) measures duplication-as-quality-smell on
# the *maintainable code corpus*. The globs below are excluded from that
# corpus because structural repetition at those sites is either inherent to
# the artefact (generator output) or intentional (test isolation,
# package-local config shape) — not a quality signal.
#
# This block does NOT silence real source files. Duplication in hand-written
# library/app/service code remains a first-class signal and is not excluded.
#
# Per-glob justification:
#   - **/src/types/generated/**       Output of openapi-typescript codegen;
#                                     structural repetition is the nature of
#                                     generator output.
#   - **/*.test.ts, **/*.test.tsx,
#     **/tests/**, **/e2e-tests/**    Repetitive arrange/fixture/setup is
#                                     intentional for test isolation; DRY
#                                     across tests would couple unrelated
#                                     test cases.
#   - **/*.config.*                   Repeated local config shape is an
#                                     intentional package boundary marker;
#                                     shared behaviour belongs in imported
#                                     config helpers, while per-package
#                                     config files stay explicit.
#   - packages/sdks/oak-sdk-codegen/src/types/generated/api-schema/**
#                                     Owner-authorised explicit exception
#                                     (Director routing event 73f9c57f,
#                                     2026-05-24). The broader
#                                     **/src/types/generated/** glob above
#                                     already matches this path, so the
#                                     entry is functionally redundant for
#                                     duplication-analyser scope — it is
#                                     kept as an explicit audit-trail
#                                     marker that this codegen directory
#                                     is an owner-ratified exclusion
#                                     boundary, recorded per owner
#                                     direction: "this is not typically
#                                     allowed, this is a specific user
#                                     intervention".
#   - **/*.external-data.ts           External-source data snapshots (the
#                                     external-data file convention). A faithful
#                                     mirror of an external dataset (e.g. the EEF
#                                     Teaching & Learning Toolkit), not authored
#                                     code; de-duplicating its literals would
#                                     distort fidelity to the source, which is
#                                     the value. Fix path is upstream (the source
#                                     or refresh), never at the site. Keep the
#                                     file pure data (no exported logic), verified
#                                     by review when the snapshot changes — not an
#                                     automated gate. Owner-authorised 2026-05-29.
#
# Policy authority: docs/governance/sonar-disposition-policy.md
# Repository discipline: .agent/rules/never-disable-checks.md
#   (cpd.exclusions adjust the duplication-analyser denominator scope;
#    they do not disable any rule.)

# Example
#sonar.cpd.exclusions=src/generated/**/*,src/legacy/**/*,**/vendor/**/*
sonar.cpd.exclusions=**/src/types/generated/**,**/*.test.ts,**/*.test.tsx,**/tests/**,**/e2e-tests/**,**/*.config.*,packages/sdks/oak-sdk-codegen/src/types/generated/api-schema/**,**/*.external-data.ts
