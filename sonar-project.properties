sonar.projectKey=oaknational_oak-open-curriculum-ecosystem
sonar.organization=oaknational
sonar.host.url=https://sonarcloud.io

# ----------------------------------------------------------------------------
# Issue suppressions (multicriteria)
# ----------------------------------------------------------------------------
# Per PR-87 Phase 0 Task 0.2 owner-approved policy. Each rule suppression
# names its rationale; the entry is per-rule, not per-file.
#
# m1 — typescript:S6594 "Use RegExp.exec() over String.match()"
#   Micro-optimisation; not universally beneficial. Oak's regex usage is
#   non-hot-path readability-first; String.match() reads cleanly and the
#   minor allocation is irrelevant in our use sites.
# m2 — typescript:S6644 "Use ??= for conditional default assignment"
#   Style preference. The explicit `if (x === undefined) x = ...` form
#   is more legible at call sites that branch on undefined-vs-null.
# m3 — typescript:S7748 "Avoid 0.0 zero-fraction"
#   `0.0` is a deliberate float-intent signal in Oak's numeric code paths
#   (e.g., signalling that a default coordinate is a float, not an int).
sonar.issue.ignore.multicriteria=m1,m2,m3
sonar.issue.ignore.multicriteria.m1.ruleKey=typescript:S6594
sonar.issue.ignore.multicriteria.m1.resourceKey=**/*.ts
sonar.issue.ignore.multicriteria.m2.ruleKey=typescript:S6644
sonar.issue.ignore.multicriteria.m2.resourceKey=**/*.ts
sonar.issue.ignore.multicriteria.m3.ruleKey=typescript:S7748
sonar.issue.ignore.multicriteria.m3.resourceKey=**/*.ts
